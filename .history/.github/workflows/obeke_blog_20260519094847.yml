name: Obveke Godfrey Vicent Blog CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:        
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '24'
    - name: Install dependencies
      run: npm install
    - name: Run tests
      run: npm test
    - name: test
      run: npm run dev